services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: cortex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: cortex-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  cortex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cortex_db
      BINGX_API_KEY: ${BINGX_API_KEY:-}
      BINGX_SECRET_KEY: ${BINGX_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NUXT_PUBLIC_APP_NAME: "Cortex"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.nuxt

  backup:
    image: postgres:16-alpine
    container_name: cortex-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-cortex}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./db/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c '
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
        echo "[$$TIMESTAMP] Starting backup..."
        pg_dump -h postgres -U $${PGUSER} cortex_db > /backups/cortex_$$TIMESTAMP.sql
        echo "[$$TIMESTAMP] Backup complete."
        find /backups -name "*.sql" -mtime +7 -delete
        echo "Cleaned old backups. Sleeping 24h..."
        sleep 86400
      done'

volumes:
  postgres_data:
