services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cortex_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./db/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  cortex:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/cortex_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_URL_INTERNAL: ${AUTH_URL_INTERNAL:-http://localhost:3000}
      NUXT_PUBLIC_AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NUXT_PUBLIC_APP_NAME: "Cortex"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${APP_PATH:-.}:/app
      - /app/node_modules
      - /app/.nuxt
      - ${CLAUDE_HOME_DIR}/.claude/.credentials.json:/root/.claude/.credentials.json:rw
      - ${CLAUDE_HOME_DIR}/.claude.json:/root/.claude.json:rw

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c '
      while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
        echo "[$$TIMESTAMP] Starting backup..."
        pg_dump -h postgres -U $${PGUSER} cortex_db > /backups/cortex_$$TIMESTAMP.sql
        echo "[$$TIMESTAMP] Backup complete."
        find /backups -name "*.sql" -mtime +7 -delete
        echo "Cleaned old backups. Sleeping 24h..."
        sleep 86400
      done'

volumes:
  postgres_data:
